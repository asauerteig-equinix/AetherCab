services:
  aethercad:
    build:
      context: .
      dockerfile: Dockerfile
    image: aethercad:latest
    container_name: aethercad-app
    depends_on:
      aethercad-db:
        condition: service_healthy
    ports:
      - "5500:5500"
    environment:
      PORT: "5500"
      DATABASE_URL: postgresql://aethercad:aethercad@aethercad-db:5432/aethercad
    restart: unless-stopped

  aethercad-db:
    image: postgres:17-alpine
    container_name: aethercad-db
    environment:
      POSTGRES_DB: aethercad
      POSTGRES_USER: aethercad
      POSTGRES_PASSWORD: aethercad
    ports:
      - "5496:5432"
    volumes:
      - aethercad-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aethercad -d aethercad"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  aethercad-db-data:
